name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - 'cockroach-*'
  pull_request:
    branches:
      - master
      - 'cockroach-*'

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up bootstrap Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Save GOROOT_BOOTSTRAP
        run: echo "GOROOT_BOOTSTRAP=$(go env GOROOT)" >> "$GITHUB_ENV"

      - name: Build toolchain
        run: cd src && ./make.bash

      # Run the dist test suite, skipping tests that need infrastructure
      # not available on a basic CI runner:
      #   :race / :race-external  — need race detector build
      #   :pie_* / :exe_external  — need PIE / external linking modes
      #   :nolibgcc               — need specific linker config
      #   :gofips140*             — need FIPS build configuration
      #   test{shared,plugin}     — need shared library / plugin support
      #   test{fortran,sanitizers} — need Fortran compiler / asan/msan
      #   test{cshared,carchive}  — need CGO shared/archive build modes
      - name: Run tests
        run: |
          bin/go tool dist test -k \
            -run '!:(race|race-external|pie_internal|pie_external|exe_external|nolibgcc|gofips140)|test(shared|plugin|fortran|sanitizers|cshared|carchive)'
        env:
          GOROOT: ${{ github.workspace }}
